name: Universal CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Allseer
      run: make allseer_build

    - name: Load/Test Allseer
      run: make allseer_test_workflow

    - name: Setup Underseer Venv
      run: make underseer_prep_env

    - name: Setup Overseer Venv
      run: make overseer_prep_env

    - name: Run Everything Simultaneously & Check for Webpage
      run:
        -|
         make allseer_load
         make underseer_run &
         make overseer_run &
         make overseer_test_workflow

    - name: Stop Everything
      continue-on-error: true
      run: make universal_stop
