name: Universal CI

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build The Bergamot Engine
      run: make engine_build

    - name: Load/Test The Bergamot Engine
      run: make engine_test_workflow

    - name: Setup The Bergamot Agent Venv
      run: make agent_prep_env

    - name: Setup Overseer Venv
      run: make overseer_prep_env

    - name: Run Everything Simultaneously & Check for Webpage
      run:
        -|
         make engine_load
         make agent_run &
         make overseer_run &
         make overseer_test_workflow

    - name: Stop Everything
      continue-on-error: true
      run: make universal_stop
