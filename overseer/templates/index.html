<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Bergamot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Bergamot</h1>
    <div id="stats-bar">
      <span>Live</span>
      <a class="header-link" href="/history">Historical records</a>
    </div>
  </header>

  <main class="live-main">
    <details class="iframe-dropdown iframe-dropdown-group" open>
      <summary>Process Views</summary>
      <div class="iframe-dropdown-grid">
        <iframe
          class="graph-frame graph-frame-feed"
          data-graph-frame
          src="/graph/lifecycle"
          title="Process Lifecycle"
          loading="lazy"
        ></iframe>

        <iframe
          class="graph-frame graph-frame-feed"
          data-graph-frame
          src="/graph/dead-processes"
          title="Dead Processes"
          loading="lazy"
        ></iframe>
      </div>
    </details>
  </main>

  <script src="/static/iframe_resize_parent.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
