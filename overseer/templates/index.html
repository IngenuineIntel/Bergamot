<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Bergamot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Bergamot Live</h1>
    <div id="stats-bar">
      <span>Live monitoring active</span>
      <a class="header-link" href="/history">Historical records</a>
    </div>
  </header>

  <main class="live-main">
    <section class="card live-pane live-pane-left">
      <h2>Process Lifecycle</h2>
      <div class="table-wrap live-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Start (unix.sss)</th>
              <th>Last (unix.sss)</th>
              <th>PID</th>
              <th>PPID</th>
              <th>UID</th>
              <th>Comm</th>
              <th>Exec</th>
              <th>Running</th>
              <th>Opens</th>
              <th>Connects</th>
              <th>First Open</th>
              <th>First Connect</th>
            </tr>
          </thead>
          <tbody id="lifecycle-body"></tbody>
        </table>
      </div>
    </section>

    <section class="card live-pane live-pane-right">
      <h2>All Syscalls</h2>
      <div class="table-wrap live-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time (unix.sss)</th>
              <th>PID</th>
              <th>PPID</th>
              <th>UID</th>
              <th>Type</th>
              <th>Comm</th>
              <th>Arg1</th>
              <th>Arg2</th>
            </tr>
          </thead>
          <tbody id="syscalls-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
