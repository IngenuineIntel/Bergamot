<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Bergamot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Over-Seer</h1>
    <div id="stats-bar"><span>Widget Pages Embedded via Iframes</span></div>
  </header>

  <main>
    <section class="card embed-shell full-width">
      <iframe class="graph-frame graph-frame-eps" data-graph-frame title="Events per second graph" src="/graph/events-per-sec" loading="lazy"></iframe>
    </section>

    <section class="card embed-shell full-width">
      <iframe class="graph-frame graph-frame-processes" data-graph-frame title="Processes table" src="/graph/processes" loading="lazy"></iframe>
    </section>

    <section class="card embed-shell half">
      <iframe class="graph-frame graph-frame-feed" data-graph-frame title="File opens table" src="/graph/file-opens" loading="lazy"></iframe>
    </section>

    <section class="card embed-shell half">
      <iframe class="graph-frame graph-frame-feed" data-graph-frame title="Network connections table" src="/graph/network" loading="lazy"></iframe>
    </section>
  </main>

  <script src="/static/iframe_resize_parent.js"></script>
</body>
</html>
