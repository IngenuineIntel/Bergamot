<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Bergamot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Bergamot</h1>
    <div id="stats-bar">
      <span id="stat-uptime"></span>
      <a class="header-link" href="/history">Historical records</a>
    </div>
  </header>

  <div class="overview" aria-live="polite">
    <details class="iframe-dropdown iframe-dropdown-group" open>
      <summary>System Overview</summary>
      <iframe
        class="graph-frame graph-frame-overview"
        data-graph-frame
        src="/graph/overview"
        title="System Overview"
        loading="lazy"
      ></iframe>
    </details>
  </div>

  <div class="lifecycle">
    <details class="iframe-dropdown iframe-dropdown-group" open>
      <summary>Process Lifecycle</summary>
      <div class="iframe-dropdown-grid">
        <iframe
          class="graph-frame graph-frame-feed"
          data-graph-frame
          src="/graph/lifecycle"
          title="Process Lifecycle"
          loading="lazy"
        ></iframe>

        <iframe
          class="graph-frame graph-frame-feed"
          data-graph-frame
          src="/graph/dead-processes"
          title="Dead Processes"
          loading="lazy"
        ></iframe>
      </div>
    </details>
  </div>

  <div class="syscalls">
    <details class="iframe-dropdown iframe-dropdown-group" open>
      <summary>All Events</summary>
      <iframe
        class="graph-frame graph-frame-feed"
        data-graph-frame
        src="/graph/syscalls"
        title="All Events"
        loading="lazy"
      ></iframe>
    </details>
  </div>

  <script src="/static/js/dashboard.js"></script>
  <script src="/static/iframe_resize_parent.js"></script>
</body>
</html>
